<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Voxly — Offline</title>
<style>
body{background:#0a0a0b;color:#e6e6e9;font-family:system-ui,sans-serif;padding:40px 24px}
.card{max-width:720px;margin:0 auto;background:#111113;border:1px solid #242428;border-radius:16px;padding:24px;box-shadow:0 12px 30px rgba(0,0,0,.5)}

</style>

<div class="card">
<h1>Offline mode</h1>
<p>You are offline, but Voxly still works for most conversions that are already cached.</p>
<button onclick="window.location.reload()">Retry</button>
</div>
