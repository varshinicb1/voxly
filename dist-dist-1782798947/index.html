<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Voxly — Private Media Kit. No Uploads.</title>
  <meta name="description" content="Audio, video, image, PDF, doc and 3D file tools. Convert, compress, edit — 100% in your browser. Nothing leaves your device." />
  <meta name="theme-color" content="#08080b" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icons/voxly-64.png" type="image/png" />
  <link rel="apple-touch-icon" href="./icons/voxly-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/site.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <a class="logo" href="./" title="Voxly home">
        <span class="logo-mark">◆</span><span class="logo-word">Voxly</span>
      </a>
      <span class="badge badge--muted" id="engineStatus">⚙ engine: detecting…</span>
    </div>
    <div class="topbar-right">
      <span class="pill" id="quotaBadge" style="margin-right:8px">Free: 5/5</span>
      <button class="ghost-btn" id="installPwa" hidden>⬇ Install</button>
      <button class="ghost-btn" id="historyBtn">🕒 History</button>
    </div>
  </header>

  <main class="shell">
    <nav class="sidebar" aria-label="Tools">
      <div class="sidebar-search">
        <input id="toolSearch" type="search" placeholder="Search tools…" autocomplete="off" />
      </div>
      <ul class="tool-list" id="toolList"></ul>
    </nav>

    <section class="stage">
      <div class="stage-header">
        <h1 class="stage-title" id="stageTitle">Welcome to Voxly</h1>
        <p class="stage-subtitle" id="stageSubtitle">Your private media kit. Nothing leaves your device.</p>
      </div>
      <div class="stage-body" id="stageBody"></div>
    </section>
  </main>

  <aside class="history-drawer" id="historyDrawer" hidden>
    <div class="history-head">
      <h2>History</h2>
      <button class="icon-btn" id="historyClose">✕</button>
    </div>
    <div class="history-body" id="historyBody"></div>
  </aside>

  <div class="ad-slot ad-slot--bottom" id="appUpgradeCta" aria-hidden="true"></div>

  <script type="module" src="./js/bootstrap.js"></script>
</body>
</html>
