name: Deploy Voxly to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: node scripts/build.mjs
      - run: rm -rf dist && mkdir -p pages-deploy && cp -r static/* pages-deploy/ && rm -f pages-deploy/index.html && sed -e 's|src="\./|src="./|' -e 's|href="\./|href="./|' static/index.html > pages-deploy/index.html
      - uses: actions/upload-pages-artifact@v4
        with:
          path: pages-deploy

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
